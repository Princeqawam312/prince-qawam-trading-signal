<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<title>Prince Qawam AI Signal</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
<style>
:root {
  --bg:#060810; --surface:#0c1018; --card:#0f1520;
  --border:#1c2a3a; --gold:#f0c040;
  --call:#00e676; --put:#ff4560; --cyan:#29b6f6;
  --text:#dce8f0; --muted:#4a6070;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:'Syne',sans-serif;min-height:100vh;padding-bottom:40px;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 0%,rgba(240,192,64,0.06) 0%,transparent 70%);pointer-events:none;z-index:0;}
.wrap{position:relative;z-index:1;max-width:420px;margin:0 auto;padding:0 14px;}
.header{text-align:center;padding:22px 0 14px;border-bottom:1px solid var(--border);margin-bottom:18px;}
.crown{font-size:28px;margin-bottom:4px;}
.brand-title{font-family:'Orbitron',sans-serif;font-size:16px;font-weight:900;color:var(--gold);letter-spacing:2px;text-shadow:0 0 24px rgba(240,192,64,0.5);}
.brand-sub{font-size:10px;letter-spacing:4px;color:var(--muted);margin-top:3px;text-transform:uppercase;}
.clock-bar{display:flex;justify-content:space-between;align-items:center;background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:9px 14px;margin-bottom:14px;font-size:11px;color:var(--muted);}
.clock-time{font-family:'Orbitron',sans-serif;font-size:16px;color:var(--cyan);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 8px;text-align:center;}
.stat-box .sv{font-family:'Orbitron',sans-serif;font-size:17px;font-weight:700;}
.stat-box .sl{font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:1px;}
.wins .sv{color:var(--call);} .losses .sv{color:var(--put);} .rate .sv{color:var(--gold);}
.controls{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
.ctrl-box{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:10px 12px;}
.ctrl-box label{color:var(--muted);display:block;margin-bottom:6px;font-size:10px;letter-spacing:1px;}
.ctrl-box .cv{color:var(--gold);font-weight:600;}
input[type=range]{width:100%;accent-color:var(--gold);cursor:pointer;}
.auto-row{display:flex;justify-content:space-between;align-items:center;}
.toggle{width:38px;height:22px;border-radius:11px;background:var(--border);position:relative;cursor:pointer;transition:background .3s;}
.toggle.on{background:var(--gold);}
.toggle::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .3s;}
.toggle.on::after{left:19px;}
.scan-btn{width:100%;padding:15px;background:linear-gradient(135deg,#c8960a,#f0c040,#c8960a);border:none;border-radius:12px;color:#000;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:900;letter-spacing:2px;cursor:pointer;margin-bottom:16px;box-shadow:0 4px 20px rgba(240,192,64,0.3);transition:transform .1s;}
.scan-btn:active{transform:scale(0.98);}
.scan-btn.busy{background:var(--surface);color:var(--muted);box-shadow:none;}
.prog-wrap{display:none;margin-bottom:14px;}
.prog-wrap.show{display:block;}
.prog-track{height:3px;background:var(--border);border-radius:2px;overflow:hidden;}
.prog-fill{height:100%;background:var(--gold);width:0%;transition:width .4s;}
.prog-label{font-size:10px;color:var(--muted);margin-top:5px;letter-spacing:1px;}
.section-lbl{font-size:9px;letter-spacing:3px;color:var(--muted);margin-bottom:10px;padding-left:2px;}
.sig-card{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:14px;overflow:hidden;animation:riseUp .4s ease both;}
@keyframes riseUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
.alert-banner{padding:9px 16px;font-family:'Orbitron',sans-serif;font-size:11px;font-weight:700;letter-spacing:2px;text-align:center;display:flex;align-items:center;justify-content:center;gap:8px;}
.call .alert-banner{background:rgba(0,230,118,0.12);color:var(--call);border-bottom:1px solid rgba(0,230,118,0.2);}
.put .alert-banner{background:rgba(255,69,96,0.12);color:var(--put);border-bottom:1px solid rgba(255,69,96,0.2);}
.blink{animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}
.card-body{padding:14px 16px;}
.card-brand{font-family:'Orbitron',sans-serif;font-size:11px;color:var(--gold);letter-spacing:2px;margin-bottom:12px;}
.sig-row{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;border-bottom:1px solid rgba(255,255,255,0.04);}
.sig-row .emoji{font-size:15px;width:22px;text-align:center;}
.sig-row .lbl{color:var(--muted);font-size:12px;min-width:120px;}
.sig-row .val{color:#fff;font-weight:600;}
.buy-val{color:var(--call);font-size:15px;font-weight:700;}
.sell-val{color:var(--put);font-size:15px;font-weight:700;}
.conf-inline{display:flex;align-items:center;gap:8px;flex:1;}
.conf-track-sm{flex:1;height:5px;background:var(--border);border-radius:3px;overflow:hidden;}
.conf-fill-sm{height:100%;border-radius:3px;}
.call .conf-fill-sm{background:var(--call);}
.put .conf-fill-sm{background:var(--put);}
.conf-pct{font-size:13px;font-weight:700;min-width:36px;text-align:right;}
.call .conf-pct{color:var(--call);}
.put .conf-pct{color:var(--put);}
.mart-block{background:rgba(240,192,64,0.05);border:1px solid rgba(240,192,64,0.15);border-radius:10px;padding:11px 14px;margin-top:12px;}
.mart-title{font-size:11px;color:var(--gold);font-weight:700;letter-spacing:1px;margin-bottom:8px;}
.mart-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:12px;}
.mart-row:last-child{border-bottom:none;}
.mart-lvl{display:flex;align-items:center;gap:8px;}
.lvl-badge{background:rgba(240,192,64,0.15);color:var(--gold);border-radius:4px;padding:2px 7px;font-size:10px;font-weight:700;font-family:'Orbitron',sans-serif;}
.mart-time{color:var(--text);font-weight:600;}
.log-btn{width:100%;padding:11px;margin-top:12px;border:none;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:10px;font-weight:700;letter-spacing:2px;cursor:pointer;}
.call .log-btn{background:rgba(0,230,118,0.15);color:var(--call);border:1px solid var(--call);}
.put .log-btn{background:rgba(255,69,96,0.15);color:var(--put);border:1px solid var(--put);}
.empty{text-align:center;padding:40px 20px;color:var(--muted);font-size:13px;line-height:2;}
.empty .ico{font-size:36px;margin-bottom:10px;}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;align-items:flex-end;justify-content:center;}
.overlay.show{display:flex;}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:22px 18px 38px;width:100%;max-width:420px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.modal h3{font-family:'Orbitron',sans-serif;font-size:12px;color:var(--gold);margin-bottom:10px;}
.modal-info{font-size:13px;color:#fff;margin-bottom:18px;line-height:1.6;}
.res-btns{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.res-btn{padding:14px;border:none;border-radius:10px;font-family:'Orbitron',sans-serif;font-size:12px;font-weight:700;cursor:pointer;}
.res-btn.win{background:var(--call);color:#000;}
.res-btn.lose{background:var(--put);color:#fff;}
.modal-skip{width:100%;padding:11px;margin-top:10px;background:transparent;border:1px solid var(--border);border-radius:10px;color:var(--muted);cursor:pointer;}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:9px 20px;font-size:12px;opacity:0;transition:all .3s;z-index:200;white-space:nowrap;}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
</style>
</head>
<body>

<div class="wrap">
  <div class="header">
    <div class="crown">👑</div>
    <div class="brand-title">Prince Qawam AI Signal</div>
    <div class="brand-sub">VIP Trading Signals</div>
  </div>

  <div class="clock-bar">
    <span id="session-lbl">-- SESSION</span>
    <span class="clock-time" id="clock">--:--:--</span>
    <span id="date-lbl">--</span>
  </div>

  <div class="stats-row">
    <div class="stat-box wins">
      <div class="sv" id="s-wins">0</div>
      <div class="sl">WINS</div>
    </div>
    <div class="stat-box losses">
      <div class="sv" id="s-losses">0</div>
      <div class="sl">LOSSES</div>
    </div>
    <div class="stat-box rate">
      <div class="sv" id="s-rate">--%</div>
      <div class="sl">WIN RATE</div>
    </div>
  </div>

  <div class="controls">
    <div class="ctrl-box">
      <label>MIN CONFIDENCE</label>
      <div style="display:flex;justify-content:space-between;margin-bottom:4px;">
        <span style="font-size:10px;color:var(--muted)">50%</span>
        <span class="cv" id="conf-val">70%</span>
        <span style="font-size:10px;color:var(--muted)">95%</span>
      </div>
      <input type="range" min="50" max="95" value="70" step="5" oninput="setConf(this.value)"/>
    </div>
    <div class="ctrl-box">
      <label>AUTO SCAN</label>
      <div class="auto-row" style="margin-top:8px;">
        <span style="font-size:12px;" id="auto-lbl">OFF</span>
        <div class="toggle" id="auto-tog" onclick="toggleAuto()"></div>
      </div>
      <div style="font-size:9px;color:var(--muted);margin-top:6px;">Refresh every 60s</div>
    </div>
  </div>

  <button class="scan-btn" id="scan-btn" onclick="doScan()">⚡ SCAN SIGNALS</button>

  <div class="prog-wrap" id="prog-wrap">
    <div class="prog-track">
      <div class="prog-fill" id="prog-fill"></div>
    </div>
    <div class="prog-label" id="prog-lbl">Initializing...</div>
  </div>

  <div class="section-lbl" id="section-lbl">AWAITING SCAN</div>

  <div id="signals">
    <div class="empty">
      <div class="ico">👑</div>
      Tap SCAN SIGNALS to begin<br/>
      EUR/USD · GBP/USD · USD/JPY<br/>
      AUD/USD · BTC/USD · ETH/USD
    </div>
  </div>
</div>

<div class="overlay" id="overlay">
  <div class="modal">
    <h3>👑 LOG TRADE RESULT</h3>
    <div class="modal-info" id="modal-info">--</div>
    <div class="res-btns">
      <button class="res-btn win" onclick="logResult('W')">✅ WIN</button>
      <button class="res-btn lose" onclick="logResult('L')">❌ LOSS</button>
    </div>
    <button class="modal-skip" onclick="closeModal()">Skip</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
var ASSETS = [
  "EUR/USD","GBP/USD","USD/JPY","AUD/USD","USD/CHF",
  "NZD/USD","EUR/GBP","GBP/JPY","BTC/USD","ETH/USD"
];
var minConf=70, autoTimer=null, pendingLog=null, history=[];
try{ history=JSON.parse(localStorage.getItem("pq_history")||"[]"); }catch(e){ history=[]; }

function pad(n){ return n<10?"0"+n:""+n; }

function tick(){
  var now=new Date();
  document.getElementById("clock").textContent=pad(now.getHours())+":"+pad(now.getMinutes())+":"+pad(now.getSeconds());
  document.getElementById("date-lbl").textContent=now.toLocaleDateString("en-US",{month:"short",day:"numeric"});
  var u=now.getUTCHours(), sess="🌏 SYDNEY";
  if(u>=7&&u<16) sess="🇬🇧 LONDON";
  else if(u>=12&&u<21) sess="🇺🇸 NEW YORK";
  else if(u>=23||u<8) sess="🗼 TOKYO";
  document.getElementById("session-lbl").textContent=sess;
}
setInterval(tick,1000); tick();

function setConf(v){ minConf=parseInt(v); document.getElementById("conf-val").textContent=v+"%"; }

function toggleAuto(){
  var t=document.getElementById("auto-tog");
  t.classList.toggle("on");
  var on=t.classList.contains("on");
  document.getElementById("auto-lbl").textContent=on?"ON":"OFF";
  if(on){ autoTimer=setInterval(doScan,60000); showToast("🔄 Auto-scan ON"); }
  else  { clearInterval(autoTimer); showToast("⏹ Auto-scan OFF"); }
}

function makeRng(seed){
  var s=seed;
  return function(){ s=(s*9301+49297)%233280; return s/233280; };
}

function addMins(mins){
  var d=new Date();
  d.setMinutes(d.getMinutes()+mins);
  var h=d.getHours(), m=d.getMinutes();
  var ampm=h>=12?"PM":"AM";
  h=h%12; if(h===0)h=12;
  return h+":"+pad(m)+" "+ampm;
}

function genSignal(name){
  var now=Date.now();
  var seed=(now-(now%60000))+name.charCodeAt(0)*997+name.charCodeAt(2)*31;
  var r=makeRng(seed);
  var rsiV=Math.floor(r()*100), macdB=r()>0.5, emaB=r()>0.5;
  var bbPos=r(), stK=Math.floor(r()*100), wrV=-(r()*100), momV=r()-0.5;
  var cw=0, pw=0;
  if(rsiV<30) cw+=15; else if(rsiV>70) pw+=15; else if(rsiV<45) cw+=7; else pw+=7;
  if(macdB) cw+=20; else pw+=20;
  if(emaB)  cw+=15; else pw+=15;
  if(bbPos<0.2) cw+=15; else if(bbPos>0.8) pw+=15; else if(bbPos>0.5) cw+=7; else pw+=7;
  if(stK<25) cw+=10; else if(stK>75) pw+=10;
  if(wrV<-80) cw+=10; else if(wrV>-20) pw+=10;
  if(momV>0.1) cw+=10; else if(momV<-0.1) pw+=10;
  var dir=cw>=pw?"BUY":"SELL";
  var tot=cw+pw;
  var conf=tot>0?Math.min(Math.round((Math.max(cw,pw)/tot)*100),97):50;
  var tfOpts=["1-min expiry","2-min expiry","3-min expiry","5-min expiry"];
  var tf=tfOpts[Math.floor(r()*tfOpts.length)];
  var tfMin=parseInt(tf);
  var entryMin=1+Math.floor(r()*2);
  var entryTime=addMins(entryMin);
  var mart=[
    {level:1,time:addMins(entryMin+tfMin*1)},
    {level:2,time:addMins(entryMin+tfMin*2)},
    {level:3,time:addMins(entryMin+tfMin*3)}
  ];
  var label=r()>0.5?name+" (OTC)":name;
  return {name:name,label:label,dir:dir,conf:conf,tf:tf,entryTime:entryTime,mart:mart};
}

function doScan(){
  var btn=document.getElementById("scan-btn");
  var prog=document.getElementById("prog-wrap");
  var fill=document.getElementById("prog-fill");
  var lbl=document.getElementById("prog-lbl");
  btn.classList.add("busy"); btn.textContent="SCANNING..."; prog.classList.add("show");
  var results=[], i=0;
  function next(){
    if(i>=ASSETS.length){
      lbl.textContent="✓ Scan complete"; fill.style.width="100%";
      setTimeout(function(){ prog.classList.remove("show"); fill.style.width="0%"; },900);
      btn.classList.remove("busy"); btn.textContent="⚡ SCAN SIGNALS";
      render(results); return;
    }
    lbl.textContent="Analyzing "+ASSETS[i]+"...";
    fill.style.width=((i+1)/ASSETS.length*100)+"%";
    results.push(genSignal(ASSETS[i])); i++;
    setTimeout(next,250);
  }
  next();
}

function render(results){
  var filtered=results.filter(function(s){return s.conf>=minConf;});
  filtered.sort(function(a,b){return b.conf-a.conf;});
  var now=new Date(), h=now.getHours(), m=now.getMinutes();
  var ampm=h>=12?"PM":"AM"; h=h%12; if(h===0)h=12;
  document.getElementById("section-lbl").textContent=
    filtered.length+" SIGNAL"+(filtered.length!==1?"S":"")+" · SCANNED "+h+":"+pad(m)+" "+ampm;
  var container=document.getElementById("signals");
  if(filtered.length===0){
    container.innerHTML='<div class="empty"><div class="ico">👑</div>No signals above '+minConf+'% right now<br/><span style="color:var(--cyan);font-size:11px;">Lower threshold or wait for next scan</span></div>';
    return;
  }
  var html="";
  for(var i=0;i<filtered.length;i++){
    var s=filtered[i];
    var cls=s.dir==="BUY"?"call":"put";
    var dEmoji=s.dir==="BUY"?"📈":"📉";
    var dVal=s.dir==="BUY"?'<span class="buy-val">🟢 BUY</span>':'<span class="sell-val">🔴 SELL</span>';
    var martHtml="";
    for(var j=0;j<s.mart.length;j++){
      martHtml+='<div class="mart-row"><div class="mart-lvl"><span class="lvl-badge">L'+s.mart[j].level+'</span><span style="color:var(--muted);font-size:11px;">Level '+s.mart[j].level+'</span></div><span class="mart-time">→ '+s.mart[j].time+'</span></div>';
    }
    var sl=s.label.replace(/'/g,"\\'");
    var st=s.tf.replace(/'/g,"\\'");
    var se=s.entryTime.replace(/'/g,"\\'");
    html+='<div class="sig-card '+cls+'" style="animation-delay:'+(i*0.07)+'s">'+
      '<div class="alert-banner"><span class="blink">🚨</span><span>TRADE NOW!!</span><span class="blink">🚨</span></div>'+
      '<div class="card-body">'+
        '<div class="card-brand">👑 Prince Qawam AI VIP Signal</div>'+
        '<div class="sig-row"><span class="emoji">'+dEmoji+'</span><span class="lbl">Asset</span><span class="val">'+s.label+'</span></div>'+
        '<div class="sig-row"><span class="emoji">🕒</span><span class="lbl">Timeframe</span><span class="val">'+s.tf+'</span></div>'+
        '<div class="sig-row"><span class="emoji">🤖</span><span class="lbl">AI Confidence</span><div class="conf-inline"><div class="conf-track-sm"><div class="conf-fill-sm" style="width:'+s.conf+'%"></div></div><span class="conf-pct">'+s.conf+'%</span></div></div>'+
        '<div class="sig-row"><span class="emoji">🕰️</span><span class="lbl">Entry Window</span><span class="val">'+s.entryTime+'</span></div>'+
        '<div class="sig-row"><span class="emoji">📊</span><span class="lbl">Direction</span><span class="val">'+dVal+'</span></div>'+
        '<div class="mart-block"><div class="mart-title">📊 Martingale Levels:</div>'+martHtml+'</div>'+
        '<button class="log-btn" onclick="openModal(\''+sl+'\',\''+s.dir+'\',\''+st+'\',\''+se+'\')">LOG TRADE RESULT →</button>'+
      '</div></div>';
  }
  container.innerHTML=html;
  updateStats();
}

function openModal(name,dir,tf,entry){
  pendingLog={name:name,dir:dir,tf:tf,entry:entry};
  document.getElementById("modal-info").innerHTML="<b>"+name+"</b><br/>"+(dir==="BUY"?"🟢 BUY":"🔴 SELL")+" · "+tf+" · Entry "+entry;
  document.getElementById("overlay").classList.add("show");
}
function closeModal(){ document.getElementById("overlay").classList.remove("show"); pendingLog=null; }
function logResult(r){
  if(!pendingLog)return;
  history.push({name:pendingLog.name,dir:pendingLog.dir,tf:pendingLog.tf,entry:pendingLog.entry,result:r,time:new Date().toLocaleTimeString()});
  try{ localStorage.setItem("pq_history",JSON.stringify(history)); }catch(e){}
  closeModal(); updateStats();
  showToast(r==="W"?"✅ Win logged!":"❌ Loss logged");
}
function updateStats(){
  var w=0,l=0;
  for(var i=0;i<history.length;i++){ if(history[i].result==="W")w++; else l++; }
  var t=w+l;
  document.getElementById("s-wins").textContent=w;
  document.getElementById("s-losses").textContent=l;
  document.getElementById("s-rate").textContent=t?Math.round(w/t*100)+"%":"--%";
}
function showToast(msg){
  var el=document.getElementById("toast");
  el.textContent=msg; el.classList.add("show");
  setTimeout(function(){ el.classList.remove("show"); },2500);
}
updateStats();
</script>

</body>
</html>
